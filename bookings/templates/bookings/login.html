<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Salford & Co.</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#F5EFE0;
    font-family:'DM Sans',sans-serif;
}

.container{
    background:#FFFDF8;
    padding:40px;
    border-radius:16px;
    width:350px;
    box-shadow:0 10px 40px rgba(0,0,0,0.1);
    text-align:center;
}

.title{
    font-family:'Playfair Display',serif;
    font-size:24px;
    color:#2C2416;
    margin-bottom:10px;
}

.subtitle{
    font-size:12px;
    letter-spacing:2px;
    color:#8B7355;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #EDE3CF;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#C8B89A;
}

button{
    width:100%;
    padding:12px;
    background:#8B7355;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:14px;
    letter-spacing:1px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#5C4A32;
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:#9B8B78;
}
</style>
</head>

<body>

<div class="container">
    <div class="title">Salford & Co.</div>
    <div class="subtitle">ADMIN ACCESS</div>

    <form method="post">
        {% csrf_token %}
        {{ form.username }}
        {{ form.password }}

        <button type="submit">Login</button>
    </form>

    <div class="footer">Authorized access only</div>
</div>

</body>
</html>
